<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus sites favoritos</title>

    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        h1 {
            color: #222;
        }

        .site {
            background-color: white;
            width: 400px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            width: 300px;
            border-radius: 10px;
        }

        a {
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        a:hover {
            color: red;
        }
    </style>
</head>

<body>

    <h1>Meus sites favoritos: Vitor Vaz</h1>

    <div class="site">
        <h2>YouTube</h2>

        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">

        <br><br>

        <a href="https://www.youtube.com" target="_blank">
            Acessar YouTube
        </a>
    </div>

    <div class="site">
        <h2>GitHub</h2>

        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Logo.png">

        <br><br>

        <a href="https://github.com" target="_blank">
            Acessar GitHub
        </a>
    </div>

    <div class="site">
        <h2>Spotify</h2>

        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">

        <br><br>

        <a href="https://www.spotify.com" target="_blank">
            Acessar Spotify
        </a>
    </div>

    <div class="site">
        <h2>Netflix</h2>

        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">

        <br><br>

        <a href="https://www.netflix.com" target="_blank">
            Acessar Netflix
        </a>
    </div>

    <div class="site">
        <h2>Google</h2>

        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">

        <br><br>

        <a href="https://www.google.com" target="_blank">
            Acessar Google
        </a>
    </div>

</body>

</html>
